# ──────────────────────────────────────────────────────────────
# MambGAT-AD | SMAP Windows 配置（AT 格式）
# ──────────────────────────────────────────────────────────────

data:
  dataset: smap
  format: AT
  data_dir: ./datasets/AT/SMAP
  label_file: null
  window_size: 100
  window_step: 1
  test_step: 1
  normalize: true

model:
  d_model: 64
  d_state: 16
  d_conv: 4
  expand: 2
  n_heads: 4
  n_blocks: 2
  dropout: 0.1
  pred_len: 1

train:
  epochs: 30
  batch_size: 32
  lr: 1.0e-3
  weight_decay: 1.0e-5
  patience: 5
  device: cuda
  seed: 42
  save_dir: ./checkpoints
  num_workers: 0

threshold:
  method: percentile
  percentile: 99.5
