data:
  dataset: msl
  format: AT
  data_dir: ./datasets/AT/MSL
  label_file: null
  window_size: 100
  window_step: 1
  test_step: 1
  normalize: true
model:
  d_model: 128
  d_state: 16
  d_conv: 4
  expand: 2
  n_heads: 8
  n_blocks: 3
  dropout: 0.1
  pred_len: 1
train:
  epochs: 50
  batch_size: 16
  lr: 0.001
  weight_decay: 1.0e-05
  patience: 7
  device: cuda
  seed: 42
  save_dir: ./checkpoints
  num_workers: 0
threshold:
  method: valset
  smooth_window: 10
  n_candidates: 300
  top_k: 5
