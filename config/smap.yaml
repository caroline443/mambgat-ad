# ──────────────────────────────────────────────
# MambGAT-AD  |  SMAP / MSL 配置（服务器 V100-32GB）
# 数据来源：Kaggle patrickfleith/nasa-anomaly-detection-dataset-smap-msl
# ──────────────────────────────────────────────

data:
  dataset: smap                            # smap | msl
  data_dir: ./datasets/archive/data        # 含 train/ test/ 子目录
  label_file: ./datasets/archive/labeled_anomalies.csv
  window_size: 100
  window_step: 5
  test_step: 1
  normalize: true

model:
  d_model: 128
  d_state: 16
  d_conv: 4
  expand: 2
  n_heads: 8
  n_blocks: 3
  dropout: 0.1
  pred_len: 1

train:
  epochs: 50
  batch_size: 256
  lr: 1.0e-3
  weight_decay: 1.0e-5
  patience: 7
  device: cuda
  seed: 42
  save_dir: ./checkpoints
  num_workers: 4

threshold:
  method: telemanom
  p: 0.13
  error_buffer: 100
  percentile: 99.5
