data:
  dataset: smap
  format: AT
  data_dir: ./datasets/AT/SMAP
  label_file: null
  window_size: 100
  window_step: 1
  test_step: 1
  normalize: true
model:
  d_model: 128
  d_state: 16
  d_conv: 4
  expand: 2
  n_heads: 8
  n_blocks: 3
  dropout: 0.1
  pred_len: 1
  patch_sizes:
  - 4
  - 8
  - 16
  n_snapshots: 4
train:
  epochs: 50
  batch_size: 128
  lr: 0.001
  weight_decay: 1.0e-05
  patience: 7
  device: cuda
  seed: 42
  save_dir: ./checkpoints
  num_workers: 4
  val_ratio: 0.2
loss:
  alpha: 0.5
  beta: 0.1
  lambda1: 0.1
  lambda2: 0.05
  lambda_c: 0.0
threshold:
  method: valset
  smooth_window: 10
  n_candidates: 300
  top_k: 3
